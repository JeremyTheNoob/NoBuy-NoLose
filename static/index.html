<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>不买就不会赔 — A股不值得买分析器</title>
    <link rel="stylesheet" href="/static/style.css?v=5" />
</head>
<body>

<!-- ====== 顶栏 ====== -->
<nav class="topbar">
    <div class="topbar-inner">
        <a href="/" class="brand">不买就不会赔</a>
        <div class="topbar-search">
            <input id="symbolInput" type="text" placeholder="输入股票代码" maxlength="6" autofocus />
            <button id="analyzeBtn">分析</button>
        </div>
    </div>
</nav>

<div class="main-container">

    <!-- Loading -->
    <div id="loading" class="loading-block hidden">
        <div class="spinner"></div>
        <p>正在获取数据并生成分析...</p>
        <button id="abortBtn" class="link-btn">取消</button>
    </div>

    <!-- Error -->
    <div id="error" class="error-banner hidden"></div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
        <div class="ticker-wrap">
            <canvas id="tickerCanvas"></canvas>
        </div>
        <h2>输入 A 股代码，查看不值得购买的理由</h2>
        <p>基于估值、财务、技术、风险四维度数据，AI 生成 10 条理性分析</p>
    </div>

    <!-- ====== 结果区 ====== -->
    <div id="result" class="hidden">

        <!-- 股票页头 -->
        <div class="quote-header">
            <div class="quote-left">
                <h1 id="qhName">--</h1>
                <div class="quote-meta">
                    <span id="qhCode">000001</span>
                    <span class="dot">·</span>
                    <span id="qhIndustry">--</span>
                    <span class="dot">·</span>
                    <span id="qhSource">数据源 --</span>
                </div>
            </div>
            <div class="quote-kpis">
                <div class="qkpi">
                    <div class="qkpi-label">最新价</div>
                    <div class="qkpi-value" id="qkPrice">--</div>
                </div>
                <div class="qkpi">
                    <div class="qkpi-label">PE (TTM)</div>
                    <div class="qkpi-value" id="qkPE">--</div>
                </div>
                <div class="qkpi">
                    <div class="qkpi-label">PB</div>
                    <div class="qkpi-value" id="qkPB">--</div>
                </div>
                <div class="qkpi">
                    <div class="qkpi-label">AI 模型</div>
                    <div class="qkpi-value small" id="qkAI">--</div>
                </div>
            </div>
        </div>

        <!-- 风险总览条 -->
        <div class="risk-overview" id="riskOverview"></div>

        <!-- 维度分组 -->
        <div class="layout">
            <div class="layout-main">
                <div id="dimensionGroups"></div>
            </div>
            <div class="layout-side">
                <!-- 关键数字 -->
                <div class="side-card" id="sideNumbers"></div>
                <!-- 数据来源 -->
                <div class="side-meta" id="sideMeta"></div>
            </div>
        </div>

    </div>
</div>

<!-- 底部 -->
<footer>
    <span>数据可配 · AI 可选 · 完全本地</span>
</footer>

<script src="/static/ticker.js?v=1"></script>
<script src="/static/app.js?v=6"></script>
</body>
</html>

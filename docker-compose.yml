version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: money_tracing
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  model:
    build: ./model
    ports:
      - "8001:8001"
    depends_on:
      - db

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: demo
      DB_PASSWORD: demo
      DB_NAME: money_tracing
      MODEL_URL: http://model:8001
    depends_on:
      - db
      - model

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  db_data:
